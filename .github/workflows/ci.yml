name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  ci:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
          cache: false
      - name: Install dependencies
        run: go get .
      - name: Build binary
        run: go build .
      - name: Run tests
        run: go test -v ./...
